name: Build OLLVM Pass (Windows x64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build OLLVM Pass on Windows x64
    runs-on: windows-2022

    steps:
      # ── 1. 初始化 MSVC x64 开发环境 ──────────────────────────────
      - name: Setup MSVC x64 Developer Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 2. 安装 Ninja ──────────────────────────────────────────────
      - name: Install Ninja
        shell: pwsh
        run: choco install ninja --yes

      # ── 3. 克隆 rust-lang/llvm-project ───────────────────────────
      - name: Clone rust-lang/llvm-project
        shell: pwsh
        run: |
          git clone --depth 1 `
            --branch rustc/21.1-2025-08-01 `
            https://github.com/rust-lang/llvm-project.git `
            llvm-project

      # ── 4. 缓存 LLVM 安装目录（避免每次重新编译 LLVM）────────────
      - name: Cache LLVM Install
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-build/llvm_x64
          key: llvm-windows-x64-rustc-21.1-2025-08-01-v1

      # ── 5. CMake 配置 LLVM（仅 cache miss 时执行）─────────────────
      - name: Configure LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -G "Ninja" `
            -S llvm-project/llvm `
            -B llvm-build/build `
            -DCMAKE_BUILD_TYPE=Release `
            -DLLVM_ENABLE_PROJECTS="" `
            -DLLVM_TARGETS_TO_BUILD="X86" `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DCMAKE_INSTALL_PREFIX="llvm-build/llvm_x64"

      # ── 6. 编译 & 安装 LLVM（仅 cache miss 时执行）───────────────
      - name: Build and Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: cmake --build llvm-build/build --target install -j12

      # ── 7. 克隆 0xlane/ollvm-rust ─────────────────────────────────
      - name: Clone 0xlane/ollvm-rust
        shell: pwsh
        run: |
          git clone --depth 1 `
            --branch ollvm-pass `
            https://github.com/0xlane/ollvm-rust.git `
            ollvm-rust

      # ── 8. CMake 配置 OLLVM Pass ──────────────────────────────────
      - name: Configure OLLVM Pass
        shell: pwsh
        run: |
          cmake -G "Ninja" `
            -S ollvm-rust/ollvm-pass `
            -B ollvm-rust/build `
            -DCMAKE_CXX_STANDARD=17 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DLT_LLVM_INSTALL_DIR="${{ github.workspace }}/llvm-build/llvm_x64"

      # ── 9. 编译 OLLVM Pass ────────────────────────────────────────
      - name: Build OLLVM Pass
        shell: pwsh
        run: cmake --build ollvm-rust/build -j12

      # ── 10. 上传产物 (.dll) ───────────────────────────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ollvm-pass-windows-x64
          path: ollvm-rust/build/**/*.dll
          if-no-files-found: warn
